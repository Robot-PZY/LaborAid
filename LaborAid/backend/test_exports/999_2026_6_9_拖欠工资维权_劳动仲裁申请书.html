<div class="court-document"><h1 class="center">劳动仲裁申请书</h1>
<p class="no-indent">&nbsp;</p>
<h2>一、仲裁请求</h2>
<p class="no-indent">&nbsp;</p>
<ol class="legal-list">
<li>请求支付拖欠工资 24000 元</li>
</ol>
<p class="no-indent">&nbsp;</p>
<h2>二、事实与理由</h2>
<p class="no-indent">&nbsp;</p>
<p>申请人于2023年3月入职被申请人处，担任钢筋工，月工资8000元。被申请人自2026年1月起拖欠工资，至今未支付。</p>
<p class="no-indent">&nbsp;</p>
<p>依据《中华人民共和国劳动合同法》第三十条、第八十五条规定，用人单位应当按时足额支付劳动报酬。</p>
<p class="no-indent">&nbsp;</p>
<p class="no-indent">&nbsp;</p>
<p class="no-indent" style="margin-top:12pt">此致</p>

<p>南京市劳动人事争议仲裁委员会</p>
<p class="no-indent">&nbsp;</p>
<p>申请人：（签名）</p>
<p>2026年6月9日</p>
