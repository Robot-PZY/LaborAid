<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <text x="400" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#1C2433">Sequence: Login and Protected API Request</text>
  <g font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#1C2433">
    <text x="40" y="72">Browser</text><line x1="100" y1="68" x2="760" y2="68" stroke="#E8E4DD"/>
    <text x="40" y="112">React</text><line x1="100" y1="108" x2="760" y2="108" stroke="#E8E4DD"/>
    <text x="40" y="152">FastAPI</text><line x1="100" y1="148" x2="760" y2="148" stroke="#E8E4DD"/>
    <text x="40" y="192">Auth svc</text><line x1="100" y1="188" x2="760" y2="188" stroke="#E8E4DD"/>
    <text x="40" y="232">Case svc</text><line x1="100" y1="228" x2="760" y2="228" stroke="#E8E4DD"/>
  </g>
  <defs><marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0 L8 4 L0 8 Z" fill="#D97706"/></marker></defs>
  <line x1="140" y1="68" x2="140" y2="108" stroke="#64748B"/><line x1="140" y1="108" x2="300" y2="108" stroke="#D97706" marker-end="url(#arr)"/>
  <text x="220" y="100" font-family="Arial,sans-serif" font-size="9" fill="#64748B">POST /auth/login</text>
  <line x1="300" y1="108" x2="300" y2="148" stroke="#64748B"/><line x1="300" y1="148" x2="460" y2="148" stroke="#D97706" marker-end="url(#arr)"/>
  <line x1="460" y1="148" x2="460" y2="188" stroke="#64748B"/><line x1="460" y1="188" x2="300" y2="188" stroke="#059669" marker-end="url(#arr)"/>
  <text x="380" y="180" font-family="Arial,sans-serif" font-size="9" fill="#059669">verify + JWT</text>
  <line x1="300" y1="188" x2="300" y2="108" stroke="#059669" marker-end="url(#arr)"/>
  <text x="220" y="130" font-family="Arial,sans-serif" font-size="9" fill="#059669">token + role</text>
  <line x1="140" y1="108" x2="140" y2="280" stroke="#64748B" stroke-dasharray="4"/>
  <line x1="140" y1="280" x2="300" y2="280" stroke="#D97706" marker-end="url(#arr)"/>
  <text x="220" y="272" font-family="Arial,sans-serif" font-size="9" fill="#64748B">GET /cases (Bearer token)</text>
  <line x1="300" y1="280" x2="300" y2="148" stroke="#64748B"/><line x1="300" y1="148" x2="460" y2="148" stroke="#D97706"/>
  <line x1="460" y1="148" x2="460" y2="228" stroke="#64748B"/><line x1="460" y1="228" x2="620" y2="228" stroke="#7C3AED" marker-end="url(#arr)"/>
  <text x="540" y="220" font-family="Arial,sans-serif" font-size="9" fill="#7C3AED">fetch user cases</text>
  <line x1="620" y1="228" x2="620" y2="108" stroke="#64748B"/><line x1="620" y1="108" x2="140" y2="108" stroke="#059669" marker-end="url(#arr)"/>
  <text x="380" y="100" font-family="Arial,sans-serif" font-size="9" fill="#059669">case list JSON</text>
  <rect x="80" y="320" width="640" height="80" rx="8" fill="#FAF9F6" stroke="#E8E4DD"/>
  <text x="400" y="344" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#1C2433">AdminRoute: same JWT but role=admin required for /admin/*</text>
  <text x="400" y="362" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B">ProtectedRoute redirects to /login if token missing</text>
  <text x="400" y="380" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B">localStorage: token + user JSON</text>
</svg>
