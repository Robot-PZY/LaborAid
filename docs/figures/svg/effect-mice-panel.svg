  <text x="116" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#B91C1C">Unreliable</text>

  <text x="660" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="600" fill="#059669">AFTER (LaborAid MICE)</text>
