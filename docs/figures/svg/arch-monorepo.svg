<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" fill="none">
  <text x="400" y="28" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="700" fill="#1C2433">Monorepo Project Structure</text>

  <rect x="40" y="48" width="720" height="340" rx="10" fill="#FAF9F6" stroke="#E8E4DD"/>
  <text x="60" y="76" font-family="monospace" font-size="11" font-weight="700" fill="#D97706">LaborAid/ (git root)</text>

  <text x="80" y="100" font-family="monospace" font-size="10" fill="#64748B">|-- LaborAid/</text>
  <text x="100" y="120" font-family="monospace" font-size="9" fill="#1C2433">|-- frontend/          React 19 + Vite (port 5320)</text>
  <text x="120" y="136" font-family="monospace" font-size="8" fill="#64748B">src/pages, components, config/agents.ts</text>
  <text x="100" y="156" font-family="monospace" font-size="9" fill="#1C2433">|-- backend/           FastAPI (port 8010)</text>
  <text x="120" y="172" font-family="monospace" font-size="8" fill="#64748B">app/api/routers, services/, agents/, mice/</text>
  <text x="100" y="192" font-family="monospace" font-size="9" fill="#059669">|-- resources/test/    case-001..005 demo data</text>

  <text x="80" y="216" font-family="monospace" font-size="10" fill="#64748B">|-- docs/</text>
  <text x="100" y="236" font-family="monospace" font-size="9" fill="#7C3AED">|-- diagrams/          Mermaid logic sources</text>
  <text x="100" y="256" font-family="monospace" font-size="9" fill="#7C3AED">|-- figures/           SVG + PNG slide assets</text>
  <text x="100" y="276" font-family="monospace" font-size="9" fill="#1C2433">|-- competition-scenario-design-proposal.md</text>

  <text x="80" y="300" font-family="monospace" font-size="10" fill="#64748B">|-- scripts/           export-diagrams.ps1</text>
  <text x="80" y="320" font-family="monospace" font-size="10" fill="#64748B">|-- start-laboraid.bat   one-click dev launch</text>
  <text x="80" y="340" font-family="monospace" font-size="10" fill="#64748B">|-- .env.example         LLM and DB template</text>

  <rect x="480" y="88" width="260" height="140" rx="8" fill="#FFF" stroke="#D97706"/>
  <text x="610" y="112" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#D97706">Runtime ports</text>
  <text x="500" y="132" font-family="Arial,sans-serif" font-size="9" fill="#64748B">5320 - Vite dev server</text>
  <text x="500" y="148" font-family="Arial,sans-serif" font-size="9" fill="#64748B">8010 - FastAPI + /api/docs</text>
  <text x="500" y="164" font-family="Arial,sans-serif" font-size="9" fill="#64748B">8001 - ChromaDB (optional)</text>
  <text x="500" y="180" font-family="Arial,sans-serif" font-size="9" fill="#64748B">6379 - Redis (optional)</text>
  <text x="500" y="204" font-family="Arial,sans-serif" font-size="9" fill="#64748B">Single repo = aligned FE/BE releases</text>

  <rect x="480" y="244" width="260" height="56" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-opacity="0.4"/>
  <text x="610" y="268" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#92400E">Diagram-as-code in docs/</text>
  <text x="610" y="286" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#64748B">Mermaid sources + SVG figures for PPT</text>
</svg>
