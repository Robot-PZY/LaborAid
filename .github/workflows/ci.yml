name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      ENVIRONMENT: development
      JWT_SECRET_KEY: ci-jwt-secret-not-for-production
      APP_SECRET_KEY: ci-app-secret-not-for-production
    defaults:
      run:
        working-directory: LaborAid/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "from app.main import app; print('Backend imports OK')"
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --ignore E501,F401 --exit-zero
      - name: Run tests
        run: pip install pytest pytest-asyncio httpx && pytest tests/ -q --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: LaborAid/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Type check
        run: npx tsc --noEmit
